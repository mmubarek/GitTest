server.port=8080
spring.application.name=token-api-service

# Token Configuration (MUST BE OVERRIDDEN IN PRODUCTION ENVIRONMENTS via ENV variables or config server)
app.token.secret-key=${TOKEN_SECRET_KEY_ENV:YourDefaultDevelopmentSecretKeyChangeMeNow}
app.token.expiry-minutes=${TOKEN_EXPIRY_MINUTES_ENV:30}

# Actuator endpoints exposure for Prometheus, Health, Info
management.endpoints.web.exposure.include=health,info,prometheus,metrics

# Corrected line:
management.endpoint.health.show-details=WHEN_AUTHORIZED
# If you want to add a comment about other options, do it on a separate line:
# Other options for show-details: ALWAYS (for dev), NEVER (for prod without auth)

# For Prometheus, add application tag to all metrics
management.metrics.tags.application=${spring.application.name}

# Optional: Enable Virtual Threads for Spring MVC request handling (JDK 21+)
# spring.threads.virtual.enabled=true

# Springdoc OpenAPI UI Path
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html