name: Java CI with Maven and Security Scans

on:
  push:
    branches: [ "main", "develop" ] # Or your primary branches
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin' # Or 'adopt', 'zulu', etc.
        cache: 'maven'

    - name: Build with Maven (Compiles, Runs Tests)
      run: mvn -B package --file pom.xml
      # 'package' lifecycle includes compile, test

    - name: Run SpotBugs (SAST)
      run: mvn spotbugs:check
      # This will fail the build if SpotBugs finds critical issues due to <failOnError>true</failOnError> in pom.xml

    - name: Run OWASP Dependency-Check (SCA)
      run: mvn org.owasp:dependency-check-maven:check
      # This will fail the build if high severity vulnerabilities are found due to <failBuildOnCVSS> in pom.xml

    # Optional: Upload SpotBugs report
    - name: Upload SpotBugs report
      if: always() # Run even if previous steps fail, to get the report
      uses: actions/upload-artifact@v3
      with:
        name: spotbugs-report
        path: target/spotbugsXml.xml

    # Optional: Upload Dependency-Check report
    - name: Upload Dependency-Check report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: dependency-check-report
        path: target/dependency-check-report.html # or .xml, .json